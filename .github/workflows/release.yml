name: release

# Tag-triggered publish pipeline: on push of `v<semver>` we publish
# @licensing/sdk to both npm and jsr.io, then the Go module proxy
# picks up the tag automatically (no separate Go publish step exists).
#
# Prerequisites in the merge commit the tag points at:
#   - VERSION file matches the tag (minus the leading `v`)
#   - scripts/sync-versions.mjs has been run (version:check passes)
#   - All tests pass (enforced here before publishing)
#
# Secrets required:
#   NPM_TOKEN — npm automation token with publish rights on @licensing

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # pre-releases like v0.1.0-rc.1

permissions:
  contents: read
  id-token: write  # required by both npm --provenance and jsr OIDC publish

jobs:
  verify:
    name: Verify tag matches VERSION + tests green
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: licensing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      LICENSING_PG_URL: postgres://postgres:test@localhost:5432/licensing_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go.sum

      - name: Install TS workspace deps
        run: bun install --frozen-lockfile

      # The tag (e.g. v0.1.0) must equal VERSION with a `v` prefix.
      # This prevents accidentally tagging a commit where sync-versions.mjs
      # was never run — a merge between PR merge and tag push could drift.
      - name: Tag matches VERSION file
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE_VERSION=$(cat VERSION)
          EXPECTED="v${FILE_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match VERSION '$FILE_VERSION' (expected '$EXPECTED')"
            exit 1
          fi
          echo "Tag $TAG matches VERSION $FILE_VERSION"

      - name: Manifest drift check (version:sync was run)
        run: bun run version:check

      - name: Biome check
        run: bun run check

      - name: TS typecheck
        run: bun run typecheck

      - name: TS tests (memory + sqlite + postgres)
        run: bun test
        working-directory: typescript

      - name: TS build (npm dist/)
        run: bun run build

      - name: Go vet
        run: go vet ./...

      - name: Go tests (all backends, race)
        run: go test -race -timeout 1800s ./...

  publish-npm:
    name: Publish to npm (@licensing/sdk)
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@licensing/sdk
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node (for npm CLI + provenance)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun (for build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build dist/ (tsdown)
        run: bun run build

      # --provenance requires id-token: write (granted above) and a public
      # registry. OIDC attests that this artefact came from this tag of this
      # repo via GitHub Actions — surfaced on npmjs.com as a "Provenance"
      # badge.
      - name: npm publish
        run: npm publish --access public --provenance
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-jsr:
    name: Publish to jsr.io (@licensing/sdk)
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: jsr
      url: https://jsr.io/@licensing/sdk
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps (JSR publish transpiles src/ itself)
        run: bun install --frozen-lockfile

      # JSR uses OIDC via GitHub Actions — no long-lived token needed.
      # The `id-token: write` permission above is what unlocks it.
      #
      # Every public function carries an explicit return type, so JSR's
      # fast-check passes without --allow-slow-types. This keeps .d.ts
      # generation cheap for downstream consumers.
      - name: jsr publish
        run: bunx jsr publish
        working-directory: typescript

  notify-go-proxy:
    name: Warm Go module proxy
    needs: verify
    runs-on: ubuntu-latest
    steps:
      # pkg.go.dev picks up tags automatically, but fetching via the proxy
      # forces immediate indexing instead of the lazy on-first-request path.
      # This makes `go get github.com/AnoRebel/licensing@vX.Y.Z` work the
      # moment the tag is pushed.
      - name: Prime proxy.golang.org
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MODULE="github.com/AnoRebel/licensing"
          echo "Priming $MODULE@$VERSION on proxy.golang.org"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || {
            echo "::warning::Proxy did not pick up the tag immediately; this is usually transient"
            exit 0
          }
