name: release

# Tag-triggered publish pipeline: on push of `v<semver>` we publish
# @licensing/sdk to both npm and jsr.io, then the Go module proxy
# picks up the tag automatically (no separate Go publish step exists).
#
# Prerequisites in the merge commit the tag points at:
#   - VERSION file matches the tag (minus the leading `v`)
#   - scripts/sync-versions.mjs has been run (version:check passes)
#   - All tests pass (enforced here before publishing)
#
# Auth model (no long-lived secrets):
#   - npm: OIDC trusted publishing. Package → "Trusted Publisher" on
#     npmjs.com is bound to AnoRebel/licensing + this workflow filename
#     (release.yml) + environment name `npm`. Provenance attestation is
#     auto-generated from the OIDC id-token — no NPM_TOKEN, no
#     --provenance flag needed. See docs.npmjs.com/trusted-publishers.
#   - JSR: OIDC via the same `id-token: write` permission.
#   - Go: proxy.golang.org ingests public GitHub tags automatically.
#
# npm chicken-and-egg: trusted publishing can only be configured for
# packages that already exist on the registry. For the very first
# publish (v0.1.0-rc.0) the maintainer runs `npm publish` once locally
# with a one-shot token to create @licensing/sdk on npmjs.com, then
# configures the trusted publisher via the package settings UI. Every
# subsequent tag push lands through this workflow with zero stored
# secrets. The npm job is idempotent — it no-ops if the version is
# already on the registry, so the v0.1.0-rc.0 tag still fires the
# workflow cleanly after the manual bootstrap.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # pre-releases like v0.1.0-rc.1

permissions:
  contents: read
  id-token: write  # required by both npm trusted publishing and jsr OIDC

jobs:
  verify:
    name: Verify tag matches VERSION + tests green
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: licensing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      LICENSING_PG_URL: postgres://postgres:test@localhost:5432/licensing_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go.sum

      - name: Install TS workspace deps
        run: bun install --frozen-lockfile

      # The tag (e.g. v0.1.0) must equal VERSION with a `v` prefix.
      # This prevents accidentally tagging a commit where sync-versions.mjs
      # was never run — a merge between PR merge and tag push could drift.
      - name: Tag matches VERSION file
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE_VERSION=$(cat VERSION)
          EXPECTED="v${FILE_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match VERSION '$FILE_VERSION' (expected '$EXPECTED')"
            exit 1
          fi
          echo "Tag $TAG matches VERSION $FILE_VERSION"

      - name: Manifest drift check (version:sync was run)
        run: bun run version:check

      - name: Biome check
        run: bun run check

      - name: TS typecheck
        run: bun run typecheck

      - name: TS tests (memory + sqlite + postgres)
        run: bun test
        working-directory: typescript

      - name: TS build (npm dist/)
        run: bun run build

      - name: Go vet
        run: go vet ./...

      - name: Go tests (all backends, race)
        run: go test -race -timeout 1800s ./...

  publish-npm:
    name: Publish to npm (@licensing/sdk)
    needs: verify
    runs-on: ubuntu-latest
    # `environment: npm` is required by npm's trusted-publisher binding
    # — the setting on npmjs.com names this exact environment, and
    # GitHub OIDC tokens only include the `environment` claim when the
    # job opts into one. Without this, npm rejects the publish with
    # "OIDC claim mismatch".
    environment:
      name: npm
      url: https://www.npmjs.com/package/@licensing/sdk
    steps:
      - uses: actions/checkout@v6

      # npm trusted publishing requires Node.js >= 24 — earlier CLI
      # versions don't emit the id-token header the registry expects.
      - name: Setup Node (trusted publishing requires >= 24)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun (for build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build dist/ (tsdown)
        run: bun run build

      # Apache-2.0 §4(a)+(c) requires shipping LICENSE + NOTICE in every
      # distribution. typescript/package.json `files` and typescript/jsr.json
      # `publish.include` declare them, but the canonical copies live at the
      # repo root — copy them in place before publish so npm pack picks them
      # up. Local dev and VCS stay clean (no symlinks / duplicates).
      - name: Stage LICENSE + NOTICE
        run: cp LICENSE NOTICE typescript/

      # Idempotent publish: skip cleanly if @licensing/sdk@<VERSION> is
      # already on the registry. This matters because v0.1.0-rc.0 ships
      # via a one-shot local `npm publish` before the trusted-publisher
      # config exists (npm chicken-and-egg — see workflow header). Once
      # the tag fires this workflow, we want it to succeed without
      # erroring on "409 Conflict: cannot republish".
      #
      # For every subsequent tag the check misses, and `npm publish`
      # runs through trusted publishing: no NODE_AUTH_TOKEN, no
      # --provenance flag (attestations are auto-generated from the
      # OIDC id-token when the trusted publisher is configured).
      - name: npm publish (idempotent; trusted publishing via OIDC)
        working-directory: typescript
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@licensing/sdk@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "@licensing/sdk@${PKG_VERSION} is already on the registry; skipping publish."
            exit 0
          fi
          npm publish --access public

  publish-jsr:
    name: Publish to jsr.io (@licensing/sdk)
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: jsr
      url: https://jsr.io/@licensing/sdk
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps (JSR publish transpiles src/ itself)
        run: bun install --frozen-lockfile

      # Apache-2.0 §4(a)+(c) requires shipping LICENSE + NOTICE. jsr.json
      # `publish.include` declares both; stage them from the repo root so
      # `jsr publish` picks them up without keeping duplicates in VCS.
      - name: Stage LICENSE + NOTICE
        run: cp LICENSE NOTICE typescript/

      # JSR uses OIDC via GitHub Actions — no long-lived token needed.
      # The `id-token: write` permission above is what unlocks it.
      #
      # Every public function carries an explicit return type, so JSR's
      # fast-check passes without --allow-slow-types. This keeps .d.ts
      # generation cheap for downstream consumers.
      #
      # One-time bootstrap: the @licensing scope + sdk package must be
      # created at jsr.io/new and linked to AnoRebel/licensing via the
      # package settings UI before the first tag is pushed. The tag
      # itself publishes the first version through OIDC — no manual
      # `jsr publish` is needed, unlike the npm path.
      #
      # Safe to re-run on a stale tag: `jsr publish` is a no-op when
      # the jsr.json version already exists on the registry (jsr-io
      # docs: "will not attempt to publish if the version specified in
      # your jsr.json is already published"), so a tag rebuild never
      # 409s.
      - name: jsr publish
        run: bunx jsr publish
        working-directory: typescript

  notify-go-proxy:
    name: Warm Go module proxy
    needs: verify
    runs-on: ubuntu-latest
    steps:
      # pkg.go.dev picks up tags automatically, but fetching via the proxy
      # forces immediate indexing instead of the lazy on-first-request path.
      # This makes `go get github.com/AnoRebel/licensing@vX.Y.Z` work the
      # moment the tag is pushed.
      - name: Prime proxy.golang.org
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MODULE="github.com/AnoRebel/licensing"
          echo "Priming $MODULE@$VERSION on proxy.golang.org"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || {
            echo "::warning::Proxy did not pick up the tag immediately; this is usually transient"
            exit 0
          }
