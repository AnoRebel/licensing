name: admin-ui

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'openapi/**'
      - 'package.json'
      - 'bun.lock'
      - 'biome.json'
      - '.github/workflows/admin-ui.yml'
  pull_request:
    paths:
      - 'admin/**'
      - 'openapi/**'
      - 'package.json'
      - 'bun.lock'
      - 'biome.json'
      - '.github/workflows/admin-ui.yml'

concurrency:
  group: admin-ui-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: biome + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Biome check (admin scope)
        working-directory: .
        run: bunx biome check admin

      - name: Typecheck
        # nuxt-open-fetch regenerates the typed client into .nuxt/ during
        # `nuxt prepare` (which postinstall already ran). Drift is
        # impossible because the spec at openapi/licensing-admin.yaml is
        # the only source — if it changes, this step re-reads it.
        run: bun run typecheck

      - name: Build (Nuxt)
        run: bun run build
