name: ts

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: biome + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Biome check (format + lint)
        run: bun run check

      - name: Typecheck all TS packages
        run: bun run typecheck

      - name: Test all TS packages
        run: bun run test

      - name: Build all TS packages
        run: bun run build

      - name: VERSION sync drift check
        run: bun run version:check

  postgres:
    name: storage/postgres tests (Postgres 18)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: licensing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      LICENSING_PG_URL: postgres://postgres:test@localhost:5432/licensing_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Test with Postgres enabled
        run: bun test
        working-directory: typescript
