# Lefthook configuration — https://lefthook.dev
#
# Invoked via the `lefthook` devDependency in package.json. Install once with:
#   bunx lefthook install
#
# Scoping principles:
#   - TS hooks run only against staged TS/JSON/Vue files.
#   - Go hooks run only against staged .go files.
#   - golangci-lint uses --new-from-rev HEAD so it reports only issues
#     introduced by the staged changes (doesn't fail on pre-existing noise).
#   - The secrets scan is the last line of defense against committing PEM/key
#     material; CI has a stricter scan as well.

min_version: 1.7.0

# Conventional Commits enforcement — release-please parses the commit history
# on main to decide the next semver bump (see .github/workflows/release-please.yml
# and commitlint.config.mjs). A non-conforming commit message breaks that
# signal, so we reject it before it lands in git.
commit-msg:
  commands:
    commitlint:
      tags: lint
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    biome:
      tags: format lint typescript
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,vue}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}

    gofmt:
      tags: format go
      glob: "*.go"
      # gofmt -l prints unformatted file names; if the output is non-empty, fail.
      run: |
        unformatted=$(gofmt -l {staged_files})
        if [ -n "$unformatted" ]; then
          echo "gofmt: the following files need formatting:"
          echo "$unformatted"
          echo "Run: gofmt -w <file>"
          exit 1
        fi

    golangci-lint:
      tags: lint go
      glob: "*.go"
      # --new-from-rev HEAD limits findings to lines changed in the working tree
      # vs. HEAD, matching the staged delta for most workflows. The Go module
      # lives at the repo root (see design.md § Monorepo layout), so no `cd` is
      # needed — `./...` walks `licensing/` and `cmd/` from the working dir.
      run: golangci-lint run --new-from-rev HEAD --timeout=2m ./...

    secrets-pem:
      tags: security
      # Scan staged files for *embedded* private-key material. A real PEM key
      # has a BEGIN line followed (within a few lines) by a line of pure base64
      # of length >= 40. Source that merely *references* the PEM armor strings
      # (docstrings, template literals that emit PEM, tests that parse PEM)
      # does not match this pattern.
      #
      # Fixture keys under fixtures/keys/** are intentionally whitelisted —
      # they are documented sample keys, not production material.
      exclude:
        - "fixtures/keys/**"
        - ".gitignore"
        - "lefthook.yml"
      run: |
        bad=""
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          # Look for a BEGIN PRIVATE KEY / PGP marker immediately followed
          # (within 3 lines) by a run of base64 content of length >= 40.
          # `grep -Pz` (perl-mode, null-joined) lets us match across lines.
          if grep -Pzq '(?s)-----BEGIN ((RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY|PGP PRIVATE KEY BLOCK)-----[^\n]*\n([^\n]*\n){0,3}[A-Za-z0-9+/=]{40,}' "$f" 2>/dev/null; then
            bad="$bad $f"
          fi
        done
        if [ -n "$bad" ]; then
          echo "Refusing to commit: embedded PEM private-key material detected in:"
          for f in $bad; do echo "  $f"; done
          echo "If this is intentional fixture material, place it under fixtures/keys/."
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    interop:
      # The cross-language interop fixture suite. Wired fully at task 12.4
      # (GitHub Actions interop.yml). Until task 12.1 lands, this command is a
      # no-op that still enforces the hook is installed; flip to `fail` once
      # the harness exists so regressions can't be pushed.
      run: |
        if [ -x tools/interop/run.sh ]; then
          tools/interop/run.sh
        else
          echo "interop harness not yet implemented (task 12.1); skipping."
        fi
